<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Upload Paper</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <div class="container">
    <nav>
      <div class="brand"> QuizGenius</div>
      <a class="btn secondary" href="index.html">Home</a>
    </nav>

    <div class="card">
      <h2>Upload Previous Year Paper</h2>

      <p class="label">Paste JSON (title, board, grade, subject, year, durationMins, questions[])</p>
      <textarea id="paperJson" class="input" style="height:220px"></textarea>

      <p class="label" style="margin-top:15px">Or Upload PDF File</p>
      <input type="file" id="paperPdf" accept="application/pdf" class="input">

      <div style="margin-top:12px">
        <button class="btn" onclick="uploadPaper()">Save Paper</button>
      </div>

      <div id="adminMsg" class="label" style="margin-top:8px"></div>
    </div>
  </div>
</body>
</html>
