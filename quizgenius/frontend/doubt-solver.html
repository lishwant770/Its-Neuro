<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeuroMentor - AI Doubt Solver</title>
<link rel="icon" type="image/png" href="logo.png" />

<!-- MathJax -->
<script>
window.MathJax = {
  tex: {
    /* REMOVED tikz from MathJax on purpose */
    packages: ['base','ams','physics'],
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  svg: { fontCache: 'global' },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

/* ================= BASE ================= */

:root {
  --neon1:#00f5ff;
  --neon2:#ff00f7;
  --radius:14px;
  font-family:Poppins,system-ui,sans-serif;
}

body{
  margin:0;
  color:#f5f5f5;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 10% 10%, #0c1030, #02020a 55%),
    radial-gradient(circle at 90% 90%, #2a0030, transparent 40%);
}

/* ================= CYBER BACKGROUND ================= */

.cyber-bg{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  overflow:hidden;
}

.grid{
  position:absolute;
  inset:-50%;
  background:
    linear-gradient(#00f5ff22 1px, transparent 1px),
    linear-gradient(90deg, #00f5ff22 1px, transparent 1px);
  background-size:60px 60px;
  transform:rotateX(70deg) translateY(0);
  animation:gridMove 25s linear infinite;
  opacity:.35;
}

@keyframes gridMove{
  from{transform:rotateX(70deg) translateY(0)}
  to{transform:rotateX(70deg) translateY(600px)}
}

.scanlines{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.03),
    rgba(255,255,255,.03) 1px,
    transparent 2px,
    transparent 4px
  );
  mix-blend-mode:overlay;
  opacity:.25;
}

.noise{
  position:absolute;
  inset:0;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.08'/></svg>");
  animation:noiseMove .3s steps(2) infinite;
}

@keyframes noiseMove{
  from{transform:translate(0,0)}
  to{transform:translate(20px,-20px)}
}

/* ================= NAVBAR ================= */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(14px);
  background:linear-gradient(90deg,
    rgba(255,0,247,0.08),
    rgba(0,245,255,0.08));
  border-bottom:1px solid rgba(0,255,255,.25);
  box-shadow:
    0 0 25px rgba(0,245,255,.25),
    inset 0 0 25px rgba(255,0,247,.12);
}

.brand{
  font-size:1.7rem;
  letter-spacing:3px;
  background:linear-gradient(90deg,#00f5ff,#ff00f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 12px #00f5ff,0 0 30px #ff00f7;
  animation:titleFlicker 3s infinite;
}

@keyframes titleFlicker{
  0%,100%{opacity:1}
  50%{opacity:.6}
}

.nav-links{
  display:flex;
  gap:24px;
}

.nav-links a{
  text-decoration:none;
  color:#b8b8ff;
  font-weight:500;
}

.nav-links a:hover{
  color:#fff;
  text-shadow:0 0 8px #00f5ff;
}

/* ================= CONTAINER ================= */

.container{
  position:relative;
  max-width:880px;
  margin:50px auto;
  padding:40px;
  border-radius:var(--radius);
  background:
    linear-gradient(180deg,rgba(255,255,255,0.03),rgba(0,0,0,0.35)),
    #0b0d1a;
  border:1px solid rgba(0,255,255,.18);
  backdrop-filter:blur(18px);
  box-shadow:
    0 0 40px rgba(0,245,255,.25),
    0 0 80px rgba(255,0,247,.08);
  animation:floatPanel 6s ease-in-out infinite;
}

@keyframes floatPanel{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.container::after{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:inherit;
  background:
    linear-gradient(120deg,
      transparent 30%,
      #00f5ff88,
      #ff00f788,
      transparent 70%);
  filter:blur(14px);
  opacity:.35;
  z-index:-1;
  animation:edgeSweep 6s linear infinite;
}

@keyframes edgeSweep{
  from{background-position:0%}
  to{background-position:200%}
}

/* HUD corners */

.hud{
  position:absolute;
  width:30px;
  height:30px;
  border:2px solid #00f5ff;
  filter:drop-shadow(0 0 8px #00f5ff);
}

.hud.tl{top:10px;left:10px;border-right:none;border-bottom:none;}
.hud.tr{top:10px;right:10px;border-left:none;border-bottom:none;}
.hud.bl{bottom:10px;left:10px;border-right:none;border-top:none;}
.hud.br{bottom:10px;right:10px;border-left:none;border-top:none;}

h2{
  text-align:center;
  color:#7df9ff;
  margin-bottom:25px;
  text-shadow:0 0 10px #00f5ff,0 0 30px #ff00f7;
}

/* ================= FORMS ================= */

label{
  display:block;
  margin-top:18px;
  color:#a8a8ff;
  font-weight:600;
}

select,input[type="text"]{
  width:100%;
  background:linear-gradient(180deg,#0c0f24,#060713);
  border:1px solid rgba(0,245,255,.2);
  border-radius:var(--radius);
  color:#fff;
  padding:12px;
  margin-top:6px;
}

select:focus,input:focus{
  outline:none;
  border-color:#00f5ff;
  box-shadow:0 0 12px #00f5ff,0 0 22px #ff00f7;
}

/* ================= BUTTONS ================= */

button{
  margin-top:20px;
  width:100%;
  padding:12px 20px;
  border:none;
  border-radius:var(--radius);
  font-size:1rem;
  font-weight:600;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(120deg,#00f5ff,#ff00f7);
  letter-spacing:1px;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 18px rgba(0,245,255,.4),
    0 0 35px rgba(255,0,247,.25);
}

button:hover{
  filter:brightness(1.2) saturate(1.3);
}

button::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,#ffffff55,transparent);
  transform:translateX(-120%);
  animation:btnSweep 4s infinite;
}

@keyframes btnSweep{
  to{transform:translateX(120%)}
}

/* ================= OUTPUT ================= */

.output{
  margin-top:30px;
  background:
    linear-gradient(180deg,rgba(255,255,255,0.03),rgba(0,0,0,0.4)),
    #070815;
  border-radius:var(--radius);
  padding:20px;
  border:1px solid rgba(0,245,255,.2);
  box-shadow:
    inset 0 0 20px rgba(0,245,255,.08),
    0 0 20px rgba(255,0,247,.08);
}

.bold{color:#00ffff;font-weight:bold;}

.equation-block{
  display:block;
  background:linear-gradient(180deg,#0e1030,#060715);
  padding:12px;
  margin:14px 0;
  border-radius:var(--radius);
  text-align:center;
  border:1px solid rgba(0,245,255,.25);
  box-shadow:inset 0 0 14px rgba(0,245,255,.1);
}

/* ---- ONLY SIZE FIX FOR SVG ---- */
.equation-block svg{
  display:block;
  width:100%;
  height:auto;
  max-height:360px;
}

/* ================= LOADING ================= */

.typing-indicator span,
.processing-bubble div{
  width:8px;height:8px;
  background:#ff00f7;
  border-radius:50%;
  display:inline-block;
  animation:bounce 1.2s infinite ease-in-out;
  box-shadow:0 0 8px #ff00f7,0 0 15px #00f5ff;
}

.typing-indicator span:nth-child(2),
.processing-bubble div:nth-child(2){animation-delay:.2s;}
.typing-indicator span:nth-child(3),
.processing-bubble div:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
  0%,80%,100%{transform:scale(.7);opacity:.5;}
  40%{transform:scale(1);opacity:1;}
}

/* ================= FILE UPLOAD ================= */

.file-upload{
  position:relative;
  text-align:center;
  margin-top:10px;
}

.file-upload input{display:none;}

.custom-btn{
  display:inline-block;
  padding:12px 28px;
  color:#00ffff;
  border:2px solid #00ffff;
  border-radius:10px;
  background:rgba(0,0,0,.3);
  cursor:pointer;
  font-weight:600;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 12px rgba(0,245,255,.4),
    inset 0 0 12px rgba(0,245,255,.15);
}

.custom-btn::before{
  content:"";
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(120deg,transparent,#00ffff66,transparent);
  transition:.5s;
}

.custom-btn:hover::before{left:100%;}
.custom-btn:hover{background:#00ffff;color:#0d0d12;}

.file-name{
  margin-top:12px;
  color:#fff;
  font-size:14px;
  opacity:.8;
  word-break:break-all;
}

/* scrollbar */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:#05060c;}
::-webkit-scrollbar-thumb{
  background:linear-gradient(#00f5ff,#ff00f7);
  border-radius:10px;
}

</style>
</head>

<body>

<div class="cyber-bg">
  <div class="grid"></div>
  <div class="scanlines"></div>
  <div class="noise"></div>
</div>

<div class="navbar">
  <h1 class="brand">NeuroMentor</h1>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">Know More</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
  </div>
</div>

<div class="container">

  <div class="hud tl"></div>
  <div class="hud tr"></div>
  <div class="hud bl"></div>
  <div class="hud br"></div>

  <h2>AI-Powered Doubt Solver</h2>

  <label for="class">Select Class</label>
  <select id="class">
    <option value="">Choose...</option>
    <option>8</option><option>9</option><option>10</option>
    <option>11</option><option>12</option>
  </select>

  <label for="subject">Select Subject</label>
  <select id="subject">
    <option value="">Choose...</option>
    <option>Mathematics</option><option>Physics</option><option>Chemistry</option>
    <option>Biology</option><option>History</option>
    <option>Geography</option><option>Computer Applications</option>
  </select>

  <label for="board">Board</label>
  <select id="board">
    <option value="">Choose...</option>
    <option>ICSE</option><option>CBSE</option>
    <option>SSC</option><option>JEE</option><option>NEET</option>
  </select>

  <label for="chapter">Chapter</label>
  <input type="text" id="chapter" placeholder="Enter Chapter Name">

  <label for="qname">Question Title</label>
  <input type="text" id="qname" placeholder="Give a short title">

  <label for="textQuestion">Type your Question</label>
  <input type="text" id="textQuestion" placeholder="Enter your full question...">
  <button onclick="askAI()">Ask AI</button>

  <label for="imageInput">Or Upload Question Image</label>
  <div class="file-upload">
    <label for="imageInput" class="custom-btn">Choose File</label>
    <input type="file" id="imageInput" accept="image/*" onchange="showFileName()">
    <div class="file-name" id="fileName">No file selected</div>
  </div>

  <button onclick="solveImage()">Upload & Solve</button>

  <div id="output" class="output"></div>
</div>

<script>

const backendURL = "http://127.0.0.1:5000";

function collectMeta(){
  return {
    class: document.getElementById("class").value,
    subject: document.getElementById("subject").value,
    board: document.getElementById("board").value,
    chapter: document.getElementById("chapter").value,
    questionName: document.getElementById("qname").value
  };
}

function formatBold(text){
  return text.replace(/\*\*(.*?)\*\*/g,'<span class="bold">$1</span>');
}

/* ---------- TIKZ FIXED PIPELINE ---------- */

async function formatLatexBlocks(text){

  const tikzRegex =
    /\\begin\{tikzpicture\}[\s\S]*?\\end\{tikzpicture\}/g;

  let html = text || "";
  const matches = [...html.matchAll(tikzRegex)];

  for(const m of matches){

    const tikz = m[0];
    let replacement = "";

    try{
      const r = await fetch(`${backendURL}/render-tikz`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ tikz })
      });

      const d = await r.json();

      if(d.svg){
        replacement = `<div class="equation-block">${d.svg}</div>`;
      }else{
        replacement = `<pre class="equation-block">${tikz}</pre>`;
      }

    }catch(e){
      replacement = `<pre class="equation-block">${tikz}</pre>`;
    }

    html = html.replace(tikz, replacement);
  }

  /* normal LaTeX (non tikz) */

  html = html.replace(
    /\$\$([\s\S]*?)\$\$/g,
    (_,eq)=>`<div class='equation-block'>$$${eq}$$</div>`
  );

  return formatBold(html);
}

function showLoading(type="typing"){
  return type==="typing"
    ? `<div class='typing-indicator'><span></span><span></span><span></span></div>`
    : `<div class='processing-bubble'><div></div><div></div><div></div></div>`;
}

function smoothScrollToOutput(){
  output.scrollIntoView({behavior:"smooth"});
}

async function askAI(){

  const meta = collectMeta();
  const question = textQuestion.value;

  if(!question) return alert("Please type a question!");

  output.innerHTML = showLoading("typing");

  try{
    const res = await fetch(`${backendURL}/ask`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...meta,question})
    });

    const data = await res.json();

    const formatted = await formatLatexBlocks(data.answer);

    output.innerHTML = `<h4>AI Answer:</h4>${formatted}`;

    if(window.MathJax) await MathJax.typesetPromise();
    smoothScrollToOutput();

  }catch(err){
    output.innerHTML = `<p>Error: ${err.message}</p>`;
  }
}

async function solveImage(){

  const meta = collectMeta();
  const file = imageInput.files[0];

  if(!file) return alert("Please upload an image!");

  output.innerHTML = showLoading("processing");

  const formData = new FormData();
  formData.append("questionImage",file);
  for(const k in meta) formData.append(k,meta[k]);

  try{
    const res = await fetch(`${backendURL}/solve`,{
      method:"POST",
      body:formData
    });

    const data = await res.json();

    const formatted = await formatLatexBlocks(data.answer);

    output.innerHTML = `
      <h4>OCR Extracted Text:</h4><p>${data.ocrText}</p>
      <h4>Diagram Caption:</h4><p>${data.caption}</p>
      <h4>LLaMA Answer:</h4>${formatted}
    `;

    if(window.MathJax) await MathJax.typesetPromise();
    smoothScrollToOutput();

  }catch(err){
    output.innerHTML = `<p>Error: ${err.message}</p>`;
  }
}

function showFileName(){
  fileName.textContent = imageInput.files.length
    ? imageInput.files[0].name
    : "No file selected";
}

</script>

</body>
</html>
